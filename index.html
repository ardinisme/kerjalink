                                            <IconShield className="w-6 h-6 text-slate-400 mx-auto mb-2" />
                                            <p className="text-xs font-bold text-slate-500 uppercase">Perubahan PIN Terkunci</p>
                                            <p className="text-xs text-slate-500 mt-1">Anda berada di Mode Offline. Tidak ada kredensial yang dikunci PIN saat ini.</p>
                                        </div>
                                    )}

                                    {/* Bagian Backup Lokal */}
                                    <div className="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                                        <h4 className="font-bold text-sm text-slate-800 dark:text-white mb-1">Cadangkan Data Lokal (Offline)</h4>
                                        <p className="text-xs text-slate-500 dark:text-slate-400 mb-3">Ekspor semua link & pengaturan menjadi file .json atau pulihkan ke perangkat ini.</p>
                                        <div className="flex gap-2">
                                            <button onClick={handleExportLocal} className="flex-1 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 rounded-lg text-sm font-bold hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors flex items-center justify-center gap-1 shadow-sm">
                                                <IconDownload className="w-4 h-4" /> Ekspor
                                            </button>
                                            <label className="flex-1 py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg text-sm font-bold hover:bg-slate-700 dark:hover:bg-slate-600 transition-colors flex items-center justify-center gap-1 cursor-pointer shadow-sm">
                                                <IconUpload className="w-4 h-4" /> Impor
                                                <input type="file" accept=".json" className="hidden" onChange={handleImportLocal} />
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL KATEGORI */}
                    {isCategoryModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-md shadow-2xl flex flex-col max-h-[85vh] border border-slate-200 dark:border-slate-700">
                                <div className="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-white dark:bg-slate-800 shrink-0">
                                    <h3 className="font-bold text-lg dark:text-white">Kelola Kategori</h3>
                                    <button onClick={() => setIsCategoryModalOpen(false)} className="text-slate-400 hover:text-slate-700 dark:hover:text-white"><IconX className="w-5 h-5" /></button>
                                </div>
                                <div className="p-6 overflow-y-auto">
                                    <div className="flex gap-2 mb-6">
                                        <input type="text" value={newCategoryName} onChange={e => setNewCategoryName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddCategory()} placeholder="Kategori baru..." className="flex-1 px-4 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-sm dark:text-white focus:border-blue-500" />
                                        <button onClick={handleAddCategory} className="px-4 bg-slate-900 dark:bg-blue-600 text-white rounded-xl text-sm font-bold border border-transparent">Tambah</button>
                                    </div>
                                    <div className="space-y-2">
                                        {categories.map(cat => (
                                            <div key={cat.name} className="flex items-center justify-between p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:shadow-sm transition-shadow">
                                                {editingCatName === cat.name ? (
                                                    <div className="flex gap-2 w-full">
                                                        <input autoFocus type="text" value={editingCatValue} onChange={e => setEditingCatValue(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveEditCategory(cat.name)} className="flex-1 px-2 py-1 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded outline-none text-sm dark:text-white focus:border-blue-500" />
                                                        <button onClick={() => saveEditCategory(cat.name)} className="text-emerald-600 bg-emerald-50 dark:bg-emerald-900/30 p-1.5 rounded-lg"><IconCheck className="w-5 h-5" /></button>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <div className="flex items-center gap-3">
                                                            <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-slate-500 dark:text-slate-600 p-0.5 rounded" title="Geser kategori" draggable onDragStart={(e) => handleCatDragStart(e, cat.name)} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleCatDrop(e, cat.name)}>
                                                                <IconGrip className="w-4 h-4" />
                                                            </div>
                                                            <span className={`text-sm font-bold ${cat.isHidden ? 'text-slate-400 line-through' : 'text-slate-700 dark:text-slate-200'}`}>{cat.name}</span>
                                                            {cat.name === 'Lainnya' && <span className="text-[10px] bg-slate-100 dark:bg-slate-700 px-2 rounded-full text-slate-500 font-bold uppercase">Sistem</span>}
                                                        </div>
                                                        {cat.name !== 'Lainnya' && (
                                                            <div className="flex gap-1 text-slate-400">
                                                                <button onClick={() => toggleHideCategory(cat.name)} title={cat.isHidden ? "Tampilkan" : "Sembunyikan"} className="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg">
                                                                    {cat.isHidden ? <IconEyeOff className="w-4 h-4 text-slate-300" /> : <IconEye className="w-4 h-4 hover:text-blue-500" />}
                                                                </button>
                                                                <button onClick={() => { setEditingCatName(cat.name); setEditingCatValue(cat.name); }} className="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg"><IconEdit className="w-4 h-4 hover:text-blue-500" /></button>
                                                                <button onClick={() => handleDeleteCategory(cat.name)} className="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg"><IconTrash2 className="w-4 h-4 hover:text-red-500" /></button>
                                                            </div>
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONNECT CLOUD */}
                    {isSyncModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-md shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                                <div className="p-6 bg-emerald-50/50 dark:bg-emerald-900/20 border-b border-emerald-100 dark:border-emerald-800/30 flex justify-between items-start">
                                    <div>
                                        <h3 className="font-bold text-lg dark:text-white flex items-center gap-2"><IconCloud className="text-emerald-500 w-6 h-6"/> {syncUrl ? 'Status Cloud' : 'Sambungkan Cloud'}</h3>
                                        <p className="text-sm text-emerald-700 dark:text-emerald-400 mt-1">{syncUrl ? 'Aplikasi ini terhubung & tersinkronisasi.' : 'Cadangkan data & aktifkan fitur Kredensial.'}</p>
                                    </div>
                                    <button onClick={() => setIsSyncModalOpen(false)} className="p-1 text-emerald-600/50 hover:text-emerald-800 dark:text-emerald-500/50 dark:hover:text-emerald-300 transition-colors"><IconX className="w-6 h-6" /></button>
                                </div>
                                
                                {syncUrl ? (
                                    <div className="p-6">
                                        <div className="mb-6">
                                            <p className="text-xs font-bold text-slate-500 uppercase mb-2">URL Database Aktif</p>
                                            <input type="text" readOnly value={syncUrl} className="w-full px-3 py-2 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-mono dark:text-slate-400 opacity-70" />
                                        </div>
                                        <button onClick={handleDisconnectCloud} className="w-full py-3 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40 text-red-600 dark:text-red-400 rounded-xl font-bold text-sm transition-colors border border-red-200 dark:border-red-800/50 flex items-center justify-center gap-2">
                                            <IconCloudOff className="w-4 h-4"/> Putuskan Mode Offline
                                        </button>
                                    </div>
                                ) : (
                                    <form onSubmit={handleConnectCloud} className="p-6">
                                        <div className="space-y-4 mb-6">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Web App URL (G-Sheets)</label>
                                                <input type="text" required value={tempSyncUrl} onChange={e => setTempSyncUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-sm font-mono dark:text-white focus:border-emerald-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">PIN Keamanan *</label>
                                                <input type="password" required value={tempSyncPin} onChange={e => setTempSyncPin(e.target.value)} placeholder="Buat PIN Baru / Masukkan PIN Database" className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-sm dark:text-white focus:border-emerald-500 tracking-widest text-center" />
                                                <p className="text-xs text-slate-500 mt-2 leading-relaxed">Jika ini pertama kali URL dimasukkan, PIN ini akan <strong>mengunci database Anda</strong>. Jika menyambung ke perangkat lain, gunakan <strong>PIN yang sama</strong> dengan perangkat tersebut.</p>
                                            </div>
                                        </div>
                                        
                                        <button type="submit" disabled={isSyncing} className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold text-sm transition-colors shadow-lg shadow-emerald-200 dark:shadow-none border border-emerald-600 flex justify-center items-center gap-2">
                                            {isSyncing ? <IconRefresh className="w-5 h-5 animate-spin" /> : 'Sambungkan Sekarang'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* TOAST NOTIFICATION */}
                    {toast.show && (
                        <div className="fixed bottom-6 right-6 bg-slate-900 dark:bg-slate-800 text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 z-50 text-sm font-bold border border-slate-700 animate-fade-in">
                            <IconCheck className="w-4 h-4 text-emerald-400" /> {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
