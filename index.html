    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }

        body { -webkit-font-smoothing: antialiased; background-color: #f8fafc; transition: background-color 0.3s ease; }
        .dark body { background-color: #0f172a; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dragging { opacity: 0.5; transform: scale(0.98); border: 2px dashed #3b82f6 !important; }
    </style>
</head>

        const IconGrip = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>;

        const IconMoon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const IconKey = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>;
        const IconEyeOff = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>;
        const IconEye = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconDownload = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconUpload = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const IconSmartphone = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;
        const IconAlert = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;

        // --- Konstanta & Kriptografi ---
        const VALIDATION_STRING = "KERJALINK_SECURE_VAULT_OK";
        const AUTO_LOCK_MS = 15 * 60 * 1000; // 15 Menit

        const encryptData = (text, pin) => text ? CryptoJS.AES.encrypt(text, pin).toString() : '';
        const decryptData = (ciphertext, pin) => {
            if (!ciphertext) return '';
            try { return CryptoJS.AES.decrypt(ciphertext, pin).toString(CryptoJS.enc.Utf8) || ''; } 
            catch (e) { return ''; }
        };
        const getDomain = (url) => { try { return new URL(url).hostname; } catch(e) { return url; } };

        const DEFAULT_CATEGORIES = [
            { name: 'Utama', color: 'blue', isHidden: false },
            { name: 'Kredensial', color: 'rose', isHidden: false },
            { name: 'Referensi', color: 'amber', isHidden: false },
            { name: 'Lainnya', color: 'slate', isHidden: false }
        ];

        const normalizeCategories = (cats) => {
            if (!cats || !Array.isArray(cats)) return DEFAULT_CATEGORIES;
            return cats.map(c => typeof c === 'string' ? { name: c, color: 'slate', isHidden: false } : { ...c, isHidden: c.isHidden || false });
        };

        const COLOR_THEMES = [
            { id: 'slate', name: 'Abu-abu', bg: 'bg-slate-100 dark:bg-slate-700/50', border: 'border-slate-200 dark:border-slate-600', text: 'text-slate-700 dark:text-slate-200', icon: 'text-slate-500 dark:text-slate-400', accent: 'bg-slate-500 dark:bg-slate-400', soft: 'bg-white dark:bg-slate-800' },
            { id: 'blue', name: 'Biru', bg: 'bg-blue-100 dark:bg-blue-900/50', border: 'border-blue-200 dark:border-blue-800/80', text: 'text-blue-800 dark:text-blue-200', icon: 'text-blue-500 dark:text-blue-400', accent: 'bg-blue-500 dark:bg-blue-400', soft: 'bg-blue-50/50 dark:bg-blue-900/20' },
            { id: 'emerald', name: 'Hijau', bg: 'bg-emerald-100 dark:bg-emerald-900/50', border: 'border-emerald-200 dark:border-emerald-800/80', text: 'text-emerald-800 dark:text-emerald-200', icon: 'text-emerald-500 dark:text-emerald-400', accent: 'bg-emerald-500 dark:bg-emerald-400', soft: 'bg-emerald-50/50 dark:bg-emerald-900/20' },
            { id: 'amber', name: 'Kuning', bg: 'bg-amber-100 dark:bg-amber-900/50', border: 'border-amber-200 dark:border-amber-800/80', text: 'text-amber-800 dark:text-amber-200', icon: 'text-amber-500 dark:text-amber-400', accent: 'bg-amber-500 dark:bg-amber-400', soft: 'bg-amber-50/50 dark:bg-amber-900/20' },
            { id: 'rose', name: 'Merah Muda', bg: 'bg-rose-100 dark:bg-rose-900/50', border: 'border-rose-200 dark:border-rose-800/80', text: 'text-rose-800 dark:text-rose-200', icon: 'text-rose-500 dark:text-rose-400', accent: 'bg-rose-500 dark:bg-rose-400', soft: 'bg-rose-50/50 dark:bg-rose-900/20' },
            { id: 'purple', name: 'Ungu', bg: 'bg-purple-100 dark:bg-purple-900/50', border: 'border-purple-200 dark:border-purple-800/80', text: 'text-purple-800 dark:text-purple-200', icon: 'text-purple-500 dark:text-purple-400', accent: 'bg-purple-500 dark:bg-purple-400', soft: 'bg-purple-50/50 dark:bg-purple-900/20' },
        ];

        function App() {
            // --- State Tema ---
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('kerjaLinks_theme') === 'dark');
            useEffect(() => {
                const html = document.documentElement;
                isDarkMode ? html.classList.add('dark') : html.classList.remove('dark');
                localStorage.setItem('kerjaLinks_theme', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode]);

            // --- Setup Manifest & Service Worker untuk PWA ---
            const [installPrompt, setInstallPrompt] = useState(null);
            useEffect(() => {
                const manifestData = {
                    "name": "KerjaLink Advance", "short_name": "KerjaLink", "start_url": window.location.href.split('?')[0],
                    "display": "standalone", "background_color": isDarkMode ? "#0f172a" : "#f8fafc", "theme_color": "#2563eb",
                    "icons": [
                        { "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>", "sizes": "192x192", "type": "image/svg+xml", "purpose": "any maskable" },
                        { "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }
                    ]
                };
                const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
                document.getElementById('manifest').setAttribute('href', URL.createObjectURL(manifestBlob));

                if ('serviceWorker' in navigator) {
                    const swCode = `self.addEventListener('install', (e) => self.skipWaiting()); self.addEventListener('activate', (e) => self.clients.claim()); self.addEventListener('fetch', (e) => {});`;
                    const swBlob = new Blob([swCode], { type: 'application/javascript' });
                    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
                }

                const handleBeforeInstall = (e) => { e.preventDefault(); setInstallPrompt(e); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstall);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
            }, [isDarkMode]);

            // --- State Keamanan (Mode Cloud & Offline) ---
            const [syncUrl, setSyncUrl] = useState(() => localStorage.getItem('kerjaLinks_syncUrl') || '');
            const [localPinCheck, setLocalPinCheck] = useState(() => localStorage.getItem('kerjaLinks_pinCheck') || '');
            const [sessionPin, setSessionPin] = useState(''); 
            
            // --- State Data Utama ---
            const [categories, setCategories] = useState(() => normalizeCategories(JSON.parse(localStorage.getItem('kerjaLinks_categories'))));
            const [links, setLinks] = useState(() => JSON.parse(localStorage.getItem('kerjaLinks_data')) || []);
            
            // --- State Modal & Status ---
            const [isSyncing, setIsSyncing] = useState(false);
            const [isSyncModalOpen, setIsSyncModalOpen] = useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [conflictData, setConflictData] = useState(null); 
            const [toast, setToast] = useState({ show: false, message: '' });

            // Form Variables
            const [tempSyncUrl, setTempSyncUrl] = useState('');
            const [tempSyncPin, setTempSyncPin] = useState('');
            const [lockPinInput, setLockPinInput] = useState('');
            const [lockPinError, setLockPinError] = useState('');
            const [changePinData, setChangePinData] = useState({ oldPin: '', newPin: '', confirmPin: '' });
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
            const [editingLink, setEditingLink] = useState(null);
            const [newCategoryName, setNewCategoryName] = useState('');
            const [editingCatName, setEditingCatName] = useState(null);
            const [editingCatValue, setEditingCatValue] = useState('');
            const [formData, setFormData] = useState({ 
                title: '', url: '', category: 'Lainnya', tagsInput: '', description: '', color: 'slate', isPinned: false, username: '', password: ''
            });

            // Interaction Variables
            const [draggedLinkId, setDraggedLinkId] = useState(null);
            const [draggedCatName, setDraggedCatName] = useState(null);
            const [activeCredId, setActiveCredId] = useState(null);

            const showToast = (msg) => { setToast({ show: true, message: msg }); setTimeout(() => setToast({ show: false, message: '' }), 4000); };

            // Auto-Lock Effect (Hanya jika sedang dalam mode Cloud dan PIN terbuka)
            useEffect(() => {
                if (!syncUrl || !sessionPin) return; 
                let timeoutId;
                const resetTimer = () => {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        setSessionPin(''); // Kunci aplikasi kembali ke gembok
                        showToast('Terkunci otomatis (15 mnt tidak aktif).');
                    }, AUTO_LOCK_MS);
                };
                const events = ['mousemove', 'keydown', 'scroll', 'touchstart', 'click'];
                events.forEach(e => window.addEventListener(e, resetTimer));
                resetTimer(); 
                return () => {
                    events.forEach(e => window.removeEventListener(e, resetTimer));
                    clearTimeout(timeoutId);
                };
            }, [syncUrl, sessionPin]);

            // --- LOGIKA CLOUD SYNC & AUTH ---
            
            const openSyncConnectModal = () => {
                setTempSyncUrl(syncUrl);
                setTempSyncPin('');
                setIsSyncModalOpen(true);
            };

            const handleConnectCloud = async (e) => {
                e.preventDefault();
                const url = tempSyncUrl.trim();
                const pin = tempSyncPin.trim();

                if (!url || pin.length < 4) return showToast("URL & PIN (min 4 karakter) wajib diisi.");

                setIsSyncing(true);
                try {
                    const response = await fetch(url);
                    const textData = await response.text();
                    let data;
                    try { data = JSON.parse(textData); } catch(e) { throw new Error("URL salah (Bukan DB Json)."); }

                    if (data.pinCheck) {
                        // DB Cloud sudah ada, Cocokkan PIN
                        const testDec = decryptData(data.pinCheck, pin);
                        if (testDec !== VALIDATION_STRING) throw new Error("PIN ditolak oleh Database ini!");
                        
                        // PIN Valid. Cek apakah ada data lokal yang bisa bentrok
                        if (links.length > 0) {
                            setConflictData({
                                cloudLinks: data.links || [], cloudCategories: normalizeCategories(data.categories),
                                pinCheck: data.pinCheck, pin: pin, url: url
                            });
                            setIsSyncModalOpen(false); // Buka layar resolusi konflik
                        } else {
                            // Lokal kosong, terapkan data cloud langsung
                            applyCloudData(data.links || [], normalizeCategories(data.categories), url, pin, data.pinCheck);
                        }
                    } else {
                        // DB Cloud masih Baru/Kosong
                        const newPinCheck = encryptData(VALIDATION_STRING, pin);
                        applyCloudData(links, categories, url, pin, newPinCheck);
                    }
                } catch (error) {
                    showToast(error.message || "Gagal menyambungkan ke Cloud.");
                } finally { setIsSyncing(false); }
            };

            const applyCloudData = (newLinks, newCats, url, pin, pinCheck) => {
                setLinks(newLinks); setCategories(newCats);
                setSyncUrl(url); setSessionPin(pin); setLocalPinCheck(pinCheck);
                
                localStorage.setItem('kerjaLinks_data', JSON.stringify(newLinks));
                localStorage.setItem('kerjaLinks_categories', JSON.stringify(newCats));
                localStorage.setItem('kerjaLinks_syncUrl', url);
                localStorage.setItem('kerjaLinks_pinCheck', pinCheck);
                
                saveToCloud(newLinks, newCats, url, pinCheck); // Update Cloud Asynchronous
                setIsSyncModalOpen(false); setConflictData(null);
                showToast("Tersinkronisasi!");
            };

            const resolveConflict = (mode) => {
                if (!conflictData) return;
                const { cloudLinks, cloudCategories, pinCheck, pin, url } = conflictData;
                
                if (mode === 'merge') {
                    const mergedLinks = [...links, ...cloudLinks];
                    const catMap = new Map();
                    categories.forEach(c => catMap.set(c.name, c));
                    cloudCategories.forEach(c => catMap.set(c.name, c));
                    applyCloudData(mergedLinks, Array.from(catMap.values()), url, pin, pinCheck);
                } else if (mode === 'replace') {
                    applyCloudData(cloudLinks, cloudCategories, url, pin, pinCheck);
                }
            };

            const handleDisconnectCloud = () => {
                if (!window.confirm("Putuskan koneksi ke Cloud? Anda akan beralih ke Mode Offline & tidak bisa melihat password tersimpan.")) return;
                setSyncUrl(''); setSessionPin('');
                localStorage.removeItem('kerjaLinks_syncUrl');
                setIsSyncModalOpen(false);
                showToast("Berada di Mode Offline.");
            };

            const saveToCloud = async (newLinks, newCategories, url = syncUrl, currentPinCheck = localPinCheck) => {
                if (!url) return; setIsSyncing(true);
                try {
                    await fetch(url, {
                        method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ links: newLinks, categories: newCategories, pinCheck: currentPinCheck })
                    });
                } catch (error) { console.error("Cloud Post Error", error); } 
                finally { setIsSyncing(false); }
            };

            const updateBothAndSync = (newLinks, newCategories) => {
                setLinks(newLinks); setCategories([...newCategories]);
                localStorage.setItem('kerjaLinks_data', JSON.stringify(newLinks));
                localStorage.setItem('kerjaLinks_categories', JSON.stringify(newCategories));
                if (syncUrl) saveToCloud(newLinks, newCategories, syncUrl, localPinCheck);
            };

            // --- Layar Kunci ---
            const handleUnlockSubmit = async (e) => {
                e.preventDefault();
                const decrypted = decryptData(localPinCheck, lockPinInput);
                if (decrypted === VALIDATION_STRING) {
                    setSessionPin(lockPinInput); setLockPinInput(''); setLockPinError('');
                    
                    setIsSyncing(true);
                    try {
                        const response = await fetch(syncUrl);
                        const textData = await response.text();
                        const data = JSON.parse(textData);
                        if (data.pinCheck && data.pinCheck !== localPinCheck) {
                            if (decryptData(data.pinCheck, lockPinInput) !== VALIDATION_STRING) {
                                setSessionPin(''); showToast('PIN telah berubah di Cloud. Mohon minta PIN baru.'); return;
                            }
                            setLocalPinCheck(data.pinCheck); localStorage.setItem('kerjaLinks_pinCheck', data.pinCheck);
                        }
                        if (data.links) { setLinks(data.links); localStorage.setItem('kerjaLinks_data', JSON.stringify(data.links)); }
                        if (data.categories) { const norm = normalizeCategories(data.categories); setCategories(norm); localStorage.setItem('kerjaLinks_categories', JSON.stringify(norm)); }
                    } catch(e) { console.log("Gagal tarik cloud saat unlock", e); }
                    finally { setIsSyncing(false); }

                } else { setLockPinError('PIN Salah!'); }
            };

            // --- Layout & Filter Utama ---
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Semua');
            
            const visibleCategories = categories.filter(c => !c.isHidden);
            const navTabs = ['Semua', ...visibleCategories.map(c => c.name)];
            const hiddenCategoryNames = useMemo(() => categories.filter(c => c.isHidden).map(c => c.name), [categories]);

            const filteredLinks = useMemo(() => {
                let result = links.filter(link => {
                    const searchLower = searchQuery.toLowerCase();
                    const matchTitle = link.title.toLowerCase().includes(searchLower);
                    const matchDesc = link.description && link.description.toLowerCase().includes(searchLower);
                    const matchTags = link.tags && link.tags.some(tag => tag.toLowerCase().includes(searchLower));
                    
                    const matchSearch = matchTitle || matchDesc || matchTags;
                    const matchCat = selectedCategory === 'Semua' ? !hiddenCategoryNames.includes(link.category) : link.category === selectedCategory;
                    return matchSearch && matchCat;
                });
                return result.sort((a, b) => (a.isPinned === b.isPinned ? 0 : a.isPinned ? -1 : 1));
            }, [links, searchQuery, selectedCategory, hiddenCategoryNames]);

            // --- Handlers Link ---
            const openModal = (linkObj = null) => {
                if (linkObj && linkObj.id) {
                    setEditingLink(linkObj);
                    const safeCategory = categories.some(c => c.name === linkObj.category) ? linkObj.category : 'Lainnya';
                    setFormData({ 
                        title: linkObj.title || '', url: linkObj.url || '', category: safeCategory, 
                        tagsInput: (linkObj.tags || []).join(', '),
                        description: linkObj.description || '', color: linkObj.color || 'slate', isPinned: linkObj.isPinned || false,
                        username: sessionPin ? decryptData(linkObj.encUser, sessionPin) : '', 
                        password: sessionPin ? decryptData(linkObj.encPass, sessionPin) : ''
                    });
                } else {
                    setEditingLink(null);
                    setFormData({ title: '', url: '', category: visibleCategories.length > 0 ? visibleCategories[0].name : 'Lainnya', tagsInput: '', description: '', color: 'slate', isPinned: false, username: '', password: '' });
                }
                setIsModalOpen(true);
            };
            
            const closeModal = () => { setIsModalOpen(false); setEditingLink(null); };

            const handleSaveLink = (e) => {
                e.preventDefault();
                let finalUrl = formData.url;
                if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;

                const encUser = sessionPin ? encryptData(formData.username, sessionPin) : '';
                const encPass = sessionPin ? encryptData(formData.password, sessionPin) : '';
                const tagsArray = formData.tagsInput.split(',').map(t => t.trim()).filter(Boolean);

                const linkData = { 
                    title: formData.title, url: finalUrl, category: formData.category, tags: tagsArray, description: formData.description, 
                    color: formData.color, isPinned: formData.isPinned, encUser, encPass, hasCreds: !!(sessionPin && (formData.username || formData.password))
                };

                let newLinks;
                if (editingLink) {
                    newLinks = links.map(l => l.id === editingLink.id ? { ...l, ...linkData } : l);
                    showToast('Link diperbarui!');
                } else {
                    newLinks = [{ id: Date.now().toString(), createdAt: Date.now(), ...linkData }, ...links];
                    showToast('Link ditambahkan!');
                }
                updateBothAndSync(newLinks, categories); 
                setIsModalOpen(false); setEditingLink(null);
            };

            const handleDeleteLink = (e, id) => {
                e.stopPropagation();
                if (!window.confirm("Hapus tautan ini?")) return;
                updateBothAndSync(links.filter(l => l.id !== id), categories); showToast('Terhapus.');
            };

            const handleCopy = (e, text, type) => {
                e.stopPropagation(); if (!text) return;
                const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta);
                ta.select(); document.execCommand("copy"); document.body.removeChild(ta); showToast(`${type} disalin!`);
            };

            // --- Handlers Kategori ---
            const handleAddCategory = () => {
                const name = newCategoryName.trim(); if (!name) return;
                if (categories.some(c => c.name.toLowerCase() === name.toLowerCase()) || name.toLowerCase() === 'semua') return showToast('Kategori sudah ada.');
                updateBothAndSync(links, [...categories, { name, color: 'slate', isHidden: false }]);
                setNewCategoryName('');
            };

            const toggleHideCategory = (name) => {
                if (name === 'Lainnya') return showToast('Kategori sistem tidak bisa disembunyikan');
                const newCats = categories.map(c => c.name === name ? { ...c, isHidden: !c.isHidden } : c);
                updateBothAndSync(links, newCats);
                if (selectedCategory === name) setSelectedCategory('Semua');
            };

            const saveEditCategory = (oldName) => {
                const name = editingCatValue.trim();
                if (!name || name === oldName) { setEditingCatName(null); return; }
                if (categories.some(c => c.name.toLowerCase() === name.toLowerCase())) return showToast('Nama digunakan.');
                const newCats = categories.map(c => c.name === oldName ? { ...c, name } : c);
                const newLinks = links.map(l => l.category === oldName ? { ...l, category: name } : l);
                updateBothAndSync(newLinks, newCats);
                if (selectedCategory === oldName) setSelectedCategory(name);
                setEditingCatName(null);
            };

            const handleDeleteCategory = (catToDelete) => {
                if (catToDelete === 'Lainnya') return showToast('Kategori Sistem tidak dapat dihapus.');
                if (!window.confirm(`Hapus kategori "${catToDelete}"? Link di dalamnya akan pindah ke "Lainnya".`)) return;
                
                const newCategories = categories.filter(c => c.name !== catToDelete);
                const newLinks = links.map(l => l.category === catToDelete ? { ...l, category: 'Lainnya' } : l);
                
                updateBothAndSync(newLinks, newCategories);
                if (selectedCategory === catToDelete) setSelectedCategory('Semua');
                showToast(`Kategori dihapus.`);
            };

            const handleDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedLinkId || draggedLinkId === targetId) { setDraggedLinkId(null); return; }
                const arr = [...links];
                const dIdx = arr.findIndex(l => l.id === draggedLinkId); const tIdx = arr.findIndex(l => l.id === targetId);
                const [item] = arr.splice(dIdx, 1); arr.splice(tIdx, 0, item);
                updateBothAndSync(arr, categories); setDraggedLinkId(null);
            };

            const handleCatDrop = (e, targetName) => {
                e.preventDefault();
                if (!draggedCatName || draggedCatName === targetName) { setDraggedCatName(null); return; }
                const originalCats = [...categories];
                const draggedIndex = originalCats.findIndex(c => c.name === draggedCatName);
                const targetIndex = originalCats.findIndex(c => c.name === targetName);
                if (draggedIndex === -1 || targetIndex === -1) return;
                const [removedItem] = originalCats.splice(draggedIndex, 1);
                originalCats.splice(targetIndex, 0, removedItem);
                updateBothAndSync(links, originalCats);
                setDraggedCatName(null);
            };

            // --- Handlers Ekstra ---
            const handleInstallPWA = () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                installPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') setInstallPrompt(null);
                });
            };

            const handleChangePinSubmit = (e) => {
                e.preventDefault();
                const { oldPin, newPin, confirmPin } = changePinData;
                if (newPin !== confirmPin) return showToast("Konfirmasi PIN baru tidak cocok!");
                if (newPin.length < 4) return showToast("PIN baru minimal 4 karakter!");
                if (decryptData(localPinCheck, oldPin) !== VALIDATION_STRING) return showToast("PIN lama Anda salah!");

                const newLinks = links.map(link => {
                    if (link.hasCreds) {
                        return { ...link, encUser: encryptData(decryptData(link.encUser, oldPin), newPin), encPass: encryptData(decryptData(link.encPass, oldPin), newPin) };
                    }
                    return link;
                });

                const newPinCheck = encryptData(VALIDATION_STRING, newPin);
                setLocalPinCheck(newPinCheck); localStorage.setItem('kerjaLinks_pinCheck', newPinCheck); setSessionPin(newPin);
                updateBothAndSync(newLinks, categories, syncUrl, newPin, newPinCheck);
                showToast("PIN berhasil diubah!"); setChangePinData({ oldPin: '', newPin: '', confirmPin: '' }); setIsSettingsModalOpen(false);
            };

            const handleExportLocal = () => {
                const dataStr = JSON.stringify({ links, categories, pinCheck: localPinCheck });
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `KerjaLink_Backup_${new Date().toISOString().slice(0,10)}.json`;
                let linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri); linkElement.setAttribute('download', exportFileDefaultName); linkElement.click();
                showToast("Backup diunduh!");
            };

            const handleImportLocal = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.links && data.categories) {
                            // Jika backup memiliki PIN, wajib relogin jika mode offline.
                            if(data.pinCheck) { setLocalPinCheck(data.pinCheck); localStorage.setItem('kerjaLinks_pinCheck', data.pinCheck); }
                            updateBothAndSync(data.links, normalizeCategories(data.categories));
                            setIsSettingsModalOpen(false);
                            showToast("Data berhasil dipulihkan!");
                        } else { showToast("Format file backup tidak valid."); }
                    } catch (err) { showToast("Gagal membaca file JSON."); }
                };
                reader.readAsText(file);
            };


            // ===== GATEKEEPER RENDER (LAYAR KUNCI JIKA CLOUD AKTIF TAPI SESSION KOSONG) =====
            const isCloudLocked = Boolean(syncUrl) && !sessionPin;

            if (isCloudLocked) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900 transition-colors relative">
                        {/* Tombol Force Offline */}
                        <button onClick={() => { 
                            if(window.confirm("Ingin beralih ke Mode Offline? Kredensial password akan disembunyikan hingga Anda reconnect ke Cloud.")) { 
                                setSyncUrl(''); localStorage.removeItem('kerjaLinks_syncUrl'); 
                            } 
                        }} className="absolute top-6 right-6 text-sm font-bold text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors bg-white dark:bg-slate-800 px-4 py-2 rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
                            Mode Offline
                        </button>

                        <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-slate-200 dark:border-slate-700 shadow-2xl text-center animate-fade-in">
                            <div className="w-16 h-16 bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mx-auto mb-6">
                                <IconShield className="w-8 h-8" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">Buka Brankas</h2>
                            <p className="text-slate-500 dark:text-slate-400 text-sm mb-8">Aplikasi ini terkoneksi dengan Cloud. Masukkan PIN keamanan Anda.</p>
                            
                            <form onSubmit={handleUnlockSubmit}>
                                <input 
                                    type="password" autoFocus required value={lockPinInput} onChange={e => { setLockPinInput(e.target.value); setLockPinError(''); }}
                                    className="w-full text-center text-2xl tracking-[0.5em] px-4 py-3 bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-slate-800 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none mb-2"
                                    placeholder="••••"
                                />
                                {lockPinError && <p className="text-red-500 dark:text-red-400 text-sm mb-4">{lockPinError}</p>}
                                <button type="submit" className="w-full mt-4 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors shadow-lg shadow-blue-200 dark:shadow-none border border-blue-600 flex justify-center items-center gap-2">
                                    {isSyncing ? <IconRefresh className="w-5 h-5 animate-spin" /> : 'Buka Kunci'}
                                </button>
                            </form>
                        </div>
                        {/* TOAST NOTIFICATION UNTUK LOCKSCREEN */}
                        {toast.show && (<div className="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 z-50 text-sm font-bold border border-slate-700 animate-fade-in"><IconCheck className="w-4 h-4 text-emerald-400" /> {toast.message}</div>)}
                    </div>
                );
            }

            // ===== RENDER MODAL KONFLIK DATA =====
            if (conflictData) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm relative z-50">
                        <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl w-full max-w-lg border border-slate-200 dark:border-slate-700 shadow-2xl animate-fade-in">
                            <div className="flex items-center gap-3 text-amber-600 dark:text-amber-500 mb-4">
                                <div className="p-2 bg-amber-100 dark:bg-amber-900/30 rounded-xl"><IconAlert className="w-6 h-6" /></div>
                                <h2 className="text-xl font-bold text-slate-800 dark:text-white">Pilih Sumber Data Utama</h2>
                            </div>
                            <p className="text-slate-600 dark:text-slate-300 text-sm mb-6 leading-relaxed">
                                Kami menemukan <strong className="text-slate-800 dark:text-white">{links.length} tautan</strong> di Mode Offline (Perangkat ini), dan <strong className="text-slate-800 dark:text-white">{conflictData.cloudLinks.length} tautan</strong> di Database Cloud Anda. Tentukan tindakan sinkronisasi:
                            </p>
                            
                            <div className="space-y-3">
                                <button onClick={() => resolveConflict('merge')} className="w-full text-left p-4 rounded-2xl border-2 border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 hover:bg-emerald-100 dark:hover:bg-emerald-900/40 transition-colors group">
                                    <h4 className="font-bold text-emerald-800 dark:text-emerald-400 mb-1 flex items-center justify-between">Gabungkan Keduanya <IconCheck className="w-5 h-5 opacity-0 group-hover:opacity-100 transition-opacity" /></h4>
                                    <p className="text-xs text-emerald-600 dark:text-emerald-500">Data lama akan tetap ada dan digabung dengan data dari Cloud.</p>
                                </button>
                                <button onClick={() => resolveConflict('replace')} className="w-full text-left p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-blue-500 dark:hover:border-blue-500 transition-colors group">
                                    <h4 className="font-bold text-slate-800 dark:text-white mb-1 flex items-center justify-between">Gunakan Data Cloud Saja <IconCheck className="w-5 h-5 text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity" /></h4>
                                    <p className="text-xs text-slate-500 dark:text-slate-400">Data Offline di perangkat ini akan DITIMPA/DIHAPUS dan diganti dengan Cloud.</p>
                                </button>
                                <button onClick={() => setConflictData(null)} className="w-full py-3 text-sm font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white">Batalkan</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== RENDER MAIN APP =====
            return (
                <div className="min-h-screen pb-16 flex flex-col">
                    {/* NAVBAR ATAS */}
                    <header className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-30 shadow-sm transition-colors">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-2 text-slate-800 dark:text-white shrink-0">
                                <IconShield className="w-6 h-6 text-blue-600 dark:text-blue-500" />
                                <h1 className="text-xl font-extrabold tracking-tight hidden sm:block">KerjaLink<span className="text-blue-600 dark:text-blue-500">Adv</span></h1>
                                {!syncUrl && <span className="hidden sm:inline text-[10px] font-bold uppercase tracking-wider bg-slate-100 dark:bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full ml-1 border border-slate-200 dark:border-slate-700">Offline</span>}
                            </div>
                            
                            <div className="flex-1 max-w-lg">
                                <div className="relative">
                                    <IconSearch className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input 
                                        type="text" placeholder="Cari judul, tag, atau deskripsi..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                        className="w-full pl-9 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border border-transparent dark:border-slate-700 rounded-full focus:bg-white dark:focus:bg-slate-900 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900/30 transition-all text-sm outline-none dark:text-white"
                                    />
                                </div>
                            </div>

                            <div className="flex items-center gap-1 sm:gap-2 shrink-0">
                                {installPrompt && (
                                    <button onClick={handleInstallPWA} className="hidden sm:flex p-2 items-center gap-1 text-sm font-bold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 dark:bg-emerald-900/30 dark:text-emerald-400 rounded-full transition-colors mr-1 border border-emerald-200 dark:border-emerald-800/50">
                                        <IconSmartphone className="w-4 h-4" /> Install
                                    </button>
                                )}
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                    {isDarkMode ? <IconSun className="w-5 h-5" /> : <IconMoon className="w-5 h-5" />}
                                </button>
                                <button onClick={() => openSyncConnectModal()} className={`relative p-2 rounded-full transition-colors border ${syncUrl ? 'text-emerald-600 bg-emerald-50 border-emerald-200 dark:bg-emerald-900/30 dark:border-emerald-800/50' : 'text-slate-500 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800'}`} title="Sinkronisasi Cloud">
                                    {isSyncing ? <IconRefresh className="w-5 h-5 animate-spin" /> : (syncUrl ? <IconCloud className="w-5 h-5" /> : <IconCloudOff className="w-5 h-5" />)}
                                    {syncUrl && <span className="absolute top-1 right-1 w-2 h-2 bg-emerald-500 rounded-full"></span>}
                                </button>
                                <button onClick={() => { setChangePinData({oldPin:'',newPin:'',confirmPin:''}); setIsSettingsModalOpen(true); }} className="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Pengaturan Lanjutan">
                                    <IconSettings className="w-5 h-5" />
                                </button>
                                <button onClick={() => openModal(null)} className="ml-1 flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white px-3 sm:px-4 py-2 rounded-full font-bold text-sm transition-all shadow-md active:scale-95 border border-blue-600">
                                    <IconPlus className="w-4 h-4" /><span className="hidden sm:inline">Link</span>
                                </button>
                            </div>
                        </div>

                        {/* TAB KATEGORI (DI BAWAH NAVBAR) */}
                        <div className="bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800/50 sticky top-16 z-20">
                            <div className="max-w-6xl mx-auto px-4 sm:px-6 flex items-center gap-2 overflow-x-auto no-scrollbar py-2">
                                {navTabs.map(tab => (
                                    <button 
                                        key={tab} onClick={() => setSelectedCategory(tab)}
                                        className={`shrink-0 px-4 py-1.5 rounded-full text-sm font-bold transition-all border ${selectedCategory === tab ? 'bg-slate-800 dark:bg-blue-600 text-white border-transparent shadow-sm' : 'bg-transparent text-slate-500 dark:text-slate-400 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                                {/* Tombol Kelola Kategori di ujung tab */}

                    "display": "standalone", "background_color": isDarkMode ? "#0f172a" : "#f8fafc", "theme_color": "#2563eb",
                    "icons": [
                        { "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>", "sizes": "192x192", "type": "image/svg+xml", "purpose": "any maskable" },
                        { "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }
                    ]
                };
                const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
                document.getElementById('manifest').setAttribute('href', URL.createObjectURL(manifestBlob));

                if ('serviceWorker' in navigator) {
                    const swCode = `self.addEventListener('install', (e) => self.skipWaiting()); self.addEventListener('activate', (e) => self.clients.claim()); self.addEventListener('fetch', (e) => {});`;
                    const swBlob = new Blob([swCode], { type: 'application/javascript' });
                    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
                }

                const handleBeforeInstall = (e) => { e.preventDefault(); setInstallPrompt(e); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstall);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
            }, [isDarkMode]);

            // --- State Keamanan (Mode Cloud & Offline) ---
            const [syncUrl, setSyncUrl] = useState(() => localStorage.getItem('kerjaLinks_syncUrl') || '');
            const [localPinCheck, setLocalPinCheck] = useState(() => localStorage.getItem('kerjaLinks_pinCheck') || '');
            const [sessionPin, setSessionPin] = useState(''); 
            
            // --- State Data Utama ---
            const [categories, setCategories] = useState(() => normalizeCategories(JSON.parse(localStorage.getItem('kerjaLinks_categories'))));
            const [links, setLinks] = useState(() => JSON.parse(localStorage.getItem('kerjaLinks_data')) || []);
            
            // --- State Modal & Status ---
            const [isSyncing, setIsSyncing] = useState(false);
            const [isSyncModalOpen, setIsSyncModalOpen] = useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [conflictData, setConflictData] = useState(null); 
            const [toast, setToast] = useState({ show: false, message: '' });

            // Form Variables
            const [tempSyncUrl, setTempSyncUrl] = useState('');
            const [tempSyncPin, setTempSyncPin] = useState('');
            const [lockPinInput, setLockPinInput] = useState('');
            const [lockPinError, setLockPinError] = useState('');
            const [changePinData, setChangePinData] = useState({ oldPin: '', newPin: '', confirmPin: '' });
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
            const [editingLink, setEditingLink] = useState(null);
            const [newCategoryName, setNewCategoryName] = useState('');
            const [editingCatName, setEditingCatName] = useState(null);
            const [editingCatValue, setEditingCatValue] = useState('');
            const [formData, setFormData] = useState({ 
                title: '', url: '', category: 'Lainnya', tagsInput: '', description: '', color: 'slate', isPinned: false, username: '', password: ''
            });

            // Interaction Variables
            const [draggedLinkId, setDraggedLinkId] = useState(null);
            const [draggedCatName, setDraggedCatName] = useState(null);
            const [activeCredId, setActiveCredId] = useState(null);

            const showToast = (msg) => { setToast({ show: true, message: msg }); setTimeout(() => setToast({ show: false, message: '' }), 4000); };

            // Auto-Lock Effect (Hanya jika sedang dalam mode Cloud dan PIN terbuka)
            useEffect(() => {
                if (!syncUrl || !sessionPin) return; 
                let timeoutId;
                const resetTimer = () => {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        setSessionPin(''); // Kunci aplikasi kembali ke gembok
                        showToast('Terkunci otomatis (15 mnt tidak aktif).');
                    }, AUTO_LOCK_MS);
                };
                const events = ['mousemove', 'keydown', 'scroll', 'touchstart', 'click'];
                events.forEach(e => window.addEventListener(e, resetTimer));
                resetTimer(); 
                return () => {
                    events.forEach(e => window.removeEventListener(e, resetTimer));
                    clearTimeout(timeoutId);
                };
            }, [syncUrl, sessionPin]);

            // --- LOGIKA CLOUD SYNC & AUTH ---
            
            const openSyncConnectModal = () => {
                setTempSyncUrl(syncUrl);
                setTempSyncPin('');
                setIsSyncModalOpen(true);
            };

            const handleConnectCloud = async (e) => {
                e.preventDefault();
                const url = tempSyncUrl.trim();
                const pin = tempSyncPin.trim();

                if (!url || pin.length < 4) return showToast("URL & PIN (min 4 karakter) wajib diisi.");

                setIsSyncing(true);
                try {
                    const response = await fetch(url);
                    const textData = await response.text();
                    let data;
                    try { data = JSON.parse(textData); } catch(e) { throw new Error("URL salah (Bukan DB Json)."); }

                    if (data.pinCheck) {
                        // DB Cloud sudah ada, Cocokkan PIN
                        const testDec = decryptData(data.pinCheck, pin);
                        if (testDec !== VALIDATION_STRING) throw new Error("PIN ditolak oleh Database ini!");
                        
                        // PIN Valid. Cek apakah ada data lokal yang bisa bentrok
                        if (links.length > 0) {
                            setConflictData({
                                cloudLinks: data.links || [], cloudCategories: normalizeCategories(data.categories),
                                pinCheck: data.pinCheck, pin: pin, url: url
                            });
                            setIsSyncModalOpen(false); // Buka layar resolusi konflik
                        } else {
                            // Lokal kosong, terapkan data cloud langsung
                            applyCloudData(data.links || [], normalizeCategories(data.categories), url, pin, data.pinCheck);
                        }
                    } else {
                        // DB Cloud masih Baru/Kosong
                        const newPinCheck = encryptData(VALIDATION_STRING, pin);
                        applyCloudData(links, categories, url, pin, newPinCheck);
                    }
                } catch (error) {
                    showToast(error.message || "Gagal menyambungkan ke Cloud.");
                } finally { setIsSyncing(false); }
            };

            const applyCloudData = (newLinks, newCats, url, pin, pinCheck) => {
                setLinks(newLinks); setCategories(newCats);
                setSyncUrl(url); setSessionPin(pin); setLocalPinCheck(pinCheck);
                
                localStorage.setItem('kerjaLinks_data', JSON.stringify(newLinks));
                localStorage.setItem('kerjaLinks_categories', JSON.stringify(newCats));
                localStorage.setItem('kerjaLinks_syncUrl', url);
                localStorage.setItem('kerjaLinks_pinCheck', pinCheck);
                
                saveToCloud(newLinks, newCats, url, pinCheck); // Update Cloud Asynchronous
                setIsSyncModalOpen(false); setConflictData(null);
                showToast("Tersinkronisasi!");
            };

            const resolveConflict = (mode) => {
                if (!conflictData) return;
                const { cloudLinks, cloudCategories, pinCheck, pin, url } = conflictData;
                
                if (mode === 'merge') {
                    const mergedLinks = [...links, ...cloudLinks];
                    const catMap = new Map();
                    categories.forEach(c => catMap.set(c.name, c));
                    cloudCategories.forEach(c => catMap.set(c.name, c));
                    applyCloudData(mergedLinks, Array.from(catMap.values()), url, pin, pinCheck);
                } else if (mode === 'replace') {
                    applyCloudData(cloudLinks, cloudCategories, url, pin, pinCheck);
                }
            };

            const handleDisconnectCloud = () => {
                if (!window.confirm("Putuskan koneksi ke Cloud? Anda akan beralih ke Mode Offline & tidak bisa melihat password tersimpan.")) return;
                setSyncUrl(''); setSessionPin('');
                localStorage.removeItem('kerjaLinks_syncUrl');
                setIsSyncModalOpen(false);
                showToast("Berada di Mode Offline.");
            };

            const saveToCloud = async (newLinks, newCategories, url = syncUrl, currentPinCheck = localPinCheck) => {
                if (!url) return; setIsSyncing(true);
                try {
                    await fetch(url, {
                        method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ links: newLinks, categories: newCategories, pinCheck: currentPinCheck })
                    });
                } catch (error) { console.error("Cloud Post Error", error); } 
                finally { setIsSyncing(false); }
            };

            const updateBothAndSync = (newLinks, newCategories) => {
                setLinks(newLinks); setCategories([...newCategories]);
                localStorage.setItem('kerjaLinks_data', JSON.stringify(newLinks));
                localStorage.setItem('kerjaLinks_categories', JSON.stringify(newCategories));
                if (syncUrl) saveToCloud(newLinks, newCategories, syncUrl, localPinCheck);
            };

            // --- Layar Kunci ---
            const handleUnlockSubmit = async (e) => {
                e.preventDefault();
                const decrypted = decryptData(localPinCheck, lockPinInput);
                if (decrypted === VALIDATION_STRING) {
                    setSessionPin(lockPinInput); setLockPinInput(''); setLockPinError('');
                    
                    setIsSyncing(true);
                    try {
                        const response = await fetch(syncUrl);
                        const textData = await response.text();
                        const data = JSON.parse(textData);
                        if (data.pinCheck && data.pinCheck !== localPinCheck) {
                            if (decryptData(data.pinCheck, lockPinInput) !== VALIDATION_STRING) {
                                setSessionPin(''); showToast('PIN telah berubah di Cloud. Mohon minta PIN baru.'); return;
                            }
                            setLocalPinCheck(data.pinCheck); localStorage.setItem('kerjaLinks_pinCheck', data.pinCheck);
                        }
                        if (data.links) { setLinks(data.links); localStorage.setItem('kerjaLinks_data', JSON.stringify(data.links)); }
                        if (data.categories) { const norm = normalizeCategories(data.categories); setCategories(norm); localStorage.setItem('kerjaLinks_categories', JSON.stringify(norm)); }
                    } catch(e) { console.log("Gagal tarik cloud saat unlock", e); }
                    finally { setIsSyncing(false); }

                } else { setLockPinError('PIN Salah!'); }
            };

            // --- Layout & Filter Utama ---
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Semua');
            
            const visibleCategories = categories.filter(c => !c.isHidden);
            const navTabs = ['Semua', ...visibleCategories.map(c => c.name)];
            const hiddenCategoryNames = useMemo(() => categories.filter(c => c.isHidden).map(c => c.name), [categories]);

            const filteredLinks = useMemo(() => {
                let result = links.filter(link => {
                    const searchLower = searchQuery.toLowerCase();
                    const matchTitle = link.title.toLowerCase().includes(searchLower);
                    const matchDesc = link.description && link.description.toLowerCase().includes(searchLower);
                    const matchTags = link.tags && link.tags.some(tag => tag.toLowerCase().includes(searchLower));
                    
                    const matchSearch = matchTitle || matchDesc || matchTags;
                    const matchCat = selectedCategory === 'Semua' ? !hiddenCategoryNames.includes(link.category) : link.category === selectedCategory;
                    return matchSearch && matchCat;
                });
                return result.sort((a, b) => (a.isPinned === b.isPinned ? 0 : a.isPinned ? -1 : 1));
            }, [links, searchQuery, selectedCategory, hiddenCategoryNames]);

            // --- Handlers Link ---
            const openModal = (linkObj = null) => {
                if (linkObj && linkObj.id) {
                    setEditingLink(linkObj);
                    const safeCategory = categories.some(c => c.name === linkObj.category) ? linkObj.category : 'Lainnya';
                    setFormData({ 
                        title: linkObj.title || '', url: linkObj.url || '', category: safeCategory, 
                        tagsInput: (linkObj.tags || []).join(', '),
                        description: linkObj.description || '', color: linkObj.color || 'slate', isPinned: linkObj.isPinned || false,
                        username: sessionPin ? decryptData(linkObj.encUser, sessionPin) : '', 
                        password: sessionPin ? decryptData(linkObj.encPass, sessionPin) : ''
                    });
                } else {
                    setEditingLink(null);
                    setFormData({ title: '', url: '', category: visibleCategories.length > 0 ? visibleCategories[0].name : 'Lainnya', tagsInput: '', description: '', color: 'slate', isPinned: false, username: '', password: '' });
                }
                setIsModalOpen(true);
            };
            
            const closeModal = () => { setIsModalOpen(false); setEditingLink(null); };

            const handleSaveLink = (e) => {
                e.preventDefault();
                let finalUrl = formData.url;
                if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;

                const encUser = sessionPin ? encryptData(formData.username, sessionPin) : '';
                const encPass = sessionPin ? encryptData(formData.password, sessionPin) : '';
                const tagsArray = formData.tagsInput.split(',').map(t => t.trim()).filter(Boolean);

                const linkData = { 
                    title: formData.title, url: finalUrl, category: formData.category, tags: tagsArray, description: formData.description, 
                    color: formData.color, isPinned: formData.isPinned, encUser, encPass, hasCreds: !!(sessionPin && (formData.username || formData.password))
                };

                let newLinks;
                if (editingLink) {
                    newLinks = links.map(l => l.id === editingLink.id ? { ...l, ...linkData } : l);
                    showToast('Link diperbarui!');
                } else {
                    newLinks = [{ id: Date.now().toString(), createdAt: Date.now(), ...linkData }, ...links];
                    showToast('Link ditambahkan!');
                }
                updateBothAndSync(newLinks, categories); 
                setIsModalOpen(false); setEditingLink(null);
            };

            const handleDeleteLink = (e, id) => {
                e.stopPropagation();
                if (!window.confirm("Hapus tautan ini?")) return;
                updateBothAndSync(links.filter(l => l.id !== id), categories); showToast('Terhapus.');
            };

            const handleCopy = (e, text, type) => {
                e.stopPropagation(); if (!text) return;
                const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta);
                ta.select(); document.execCommand("copy"); document.body.removeChild(ta); showToast(`${type} disalin!`);
            };

            // --- Handlers Kategori ---
            const handleAddCategory = () => {
                const name = newCategoryName.trim(); if (!name) return;
                if (categories.some(c => c.name.toLowerCase() === name.toLowerCase()) || name.toLowerCase() === 'semua') return showToast('Kategori sudah ada.');
                updateBothAndSync(links, [...categories, { name, color: 'slate', isHidden: false }]);
                setNewCategoryName('');
            };

            const toggleHideCategory = (name) => {
                if (name === 'Lainnya') return showToast('Kategori sistem tidak bisa disembunyikan');
                const newCats = categories.map(c => c.name === name ? { ...c, isHidden: !c.isHidden } : c);
                updateBothAndSync(links, newCats);
                if (selectedCategory === name) setSelectedCategory('Semua');
            };

            const saveEditCategory = (oldName) => {
                const name = editingCatValue.trim();
                if (!name || name === oldName) { setEditingCatName(null); return; }
                if (categories.some(c => c.name.toLowerCase() === name.toLowerCase())) return showToast('Nama digunakan.');
                const newCats = categories.map(c => c.name === oldName ? { ...c, name } : c);
                const newLinks = links.map(l => l.category === oldName ? { ...l, category: name } : l);
                updateBothAndSync(newLinks, newCats);
                if (selectedCategory === oldName) setSelectedCategory(name);
                setEditingCatName(null);
            };

            const handleDeleteCategory = (catToDelete) => {
                if (catToDelete === 'Lainnya') return showToast('Kategori Sistem tidak dapat dihapus.');
                if (!window.confirm(`Hapus kategori "${catToDelete}"? Link di dalamnya akan pindah ke "Lainnya".`)) return;
                
                const newCategories = categories.filter(c => c.name !== catToDelete);
                const newLinks = links.map(l => l.category === catToDelete ? { ...l, category: 'Lainnya' } : l);
                
                updateBothAndSync(newLinks, newCategories);
                if (selectedCategory === catToDelete) setSelectedCategory('Semua');
                showToast(`Kategori dihapus.`);
            };

            const handleDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedLinkId || draggedLinkId === targetId) { setDraggedLinkId(null); return; }
                const arr = [...links];
                const dIdx = arr.findIndex(l => l.id === draggedLinkId); const tIdx = arr.findIndex(l => l.id === targetId);
                const [item] = arr.splice(dIdx, 1); arr.splice(tIdx, 0, item);
                updateBothAndSync(arr, categories); setDraggedLinkId(null);
            };

            const handleCatDrop = (e, targetName) => {
                e.preventDefault();
                if (!draggedCatName || draggedCatName === targetName) { setDraggedCatName(null); return; }
                const originalCats = [...categories];
                const draggedIndex = originalCats.findIndex(c => c.name === draggedCatName);
                const targetIndex = originalCats.findIndex(c => c.name === targetName);
                if (draggedIndex === -1 || targetIndex === -1) return;
                const [removedItem] = originalCats.splice(draggedIndex, 1);
                originalCats.splice(targetIndex, 0, removedItem);
                updateBothAndSync(links, originalCats);
                setDraggedCatName(null);
            };

            // --- Handlers Ekstra ---
            const handleInstallPWA = () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                installPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') setInstallPrompt(null);
                });
            };

            const handleChangePinSubmit = (e) => {
                e.preventDefault();
                const { oldPin, newPin, confirmPin } = changePinData;
                if (newPin !== confirmPin) return showToast("Konfirmasi PIN baru tidak cocok!");
                if (newPin.length < 4) return showToast("PIN baru minimal 4 karakter!");
                if (decryptData(localPinCheck, oldPin) !== VALIDATION_STRING) return showToast("PIN lama Anda salah!");

                const newLinks = links.map(link => {
                    if (link.hasCreds) {
                        return { ...link, encUser: encryptData(decryptData(link.encUser, oldPin), newPin), encPass: encryptData(decryptData(link.encPass, oldPin), newPin) };
                    }
                    return link;
                });

                const newPinCheck = encryptData(VALIDATION_STRING, newPin);
                setLocalPinCheck(newPinCheck); localStorage.setItem('kerjaLinks_pinCheck', newPinCheck); setSessionPin(newPin);
                updateBothAndSync(newLinks, categories, syncUrl, newPin, newPinCheck);
                showToast("PIN berhasil diubah!"); setChangePinData({ oldPin: '', newPin: '', confirmPin: '' }); setIsSettingsModalOpen(false);
            };

            const handleExportLocal = () => {
                const dataStr = JSON.stringify({ links, categories, pinCheck: localPinCheck });
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `KerjaLink_Backup_${new Date().toISOString().slice(0,10)}.json`;
                let linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri); linkElement.setAttribute('download', exportFileDefaultName); linkElement.click();
                showToast("Backup diunduh!");
            };

            const handleImportLocal = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.links && data.categories) {
                            // Jika backup memiliki PIN, wajib relogin jika mode offline.
                            if(data.pinCheck) { setLocalPinCheck(data.pinCheck); localStorage.setItem('kerjaLinks_pinCheck', data.pinCheck); }
                            updateBothAndSync(data.links, normalizeCategories(data.categories));
                            setIsSettingsModalOpen(false);
                            showToast("Data berhasil dipulihkan!");
                        } else { showToast("Format file backup tidak valid."); }
                    } catch (err) { showToast("Gagal membaca file JSON."); }
                };
                reader.readAsText(file);
            };


            // ===== GATEKEEPER RENDER (LAYAR KUNCI JIKA CLOUD AKTIF TAPI SESSION KOSONG) =====
            const isCloudLocked = Boolean(syncUrl) && !sessionPin;

            if (isCloudLocked) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-900 transition-colors relative">
                        {/* Tombol Force Offline */}
                        <button onClick={() => { 
                            if(window.confirm("Ingin beralih ke Mode Offline? Kredensial password akan disembunyikan hingga Anda reconnect ke Cloud.")) { 
                                setSyncUrl(''); localStorage.removeItem('kerjaLinks_syncUrl'); 
                            } 
                        }} className="absolute top-6 right-6 text-sm font-bold text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors bg-white dark:bg-slate-800 px-4 py-2 rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
                            Mode Offline
                        </button>

                        <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-slate-200 dark:border-slate-700 shadow-2xl text-center animate-fade-in">
                            <div className="w-16 h-16 bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mx-auto mb-6">
                                <IconShield className="w-8 h-8" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">Buka Brankas</h2>
                            <p className="text-slate-500 dark:text-slate-400 text-sm mb-8">Aplikasi ini terkoneksi dengan Cloud. Masukkan PIN keamanan Anda.</p>
                            
                            <form onSubmit={handleUnlockSubmit}>
                                <input 
                                    type="password" autoFocus required value={lockPinInput} onChange={e => { setLockPinInput(e.target.value); setLockPinError(''); }}
                                    className="w-full text-center text-2xl tracking-[0.5em] px-4 py-3 bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-slate-800 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none mb-2"
                                    placeholder="••••"
                                />
                                {lockPinError && <p className="text-red-500 dark:text-red-400 text-sm mb-4">{lockPinError}</p>}
                                <button type="submit" className="w-full mt-4 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors shadow-lg shadow-blue-200 dark:shadow-none border border-blue-600 flex justify-center items-center gap-2">
                                    {isSyncing ? <IconRefresh className="w-5 h-5 animate-spin" /> : 'Buka Kunci'}
                                </button>
                            </form>
                        </div>
                        {/* TOAST NOTIFICATION UNTUK LOCKSCREEN */}
                        {toast.show && (<div className="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 z-50 text-sm font-bold border border-slate-700 animate-fade-in"><IconCheck className="w-4 h-4 text-emerald-400" /> {toast.message}</div>)}
                    </div>
                );
            }

            // ===== RENDER MODAL KONFLIK DATA =====
            if (conflictData) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm relative z-50">
                        <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl w-full max-w-lg border border-slate-200 dark:border-slate-700 shadow-2xl animate-fade-in">
                            <div className="flex items-center gap-3 text-amber-600 dark:text-amber-500 mb-4">
                                <div className="p-2 bg-amber-100 dark:bg-amber-900/30 rounded-xl"><IconAlert className="w-6 h-6" /></div>
                                <h2 className="text-xl font-bold text-slate-800 dark:text-white">Pilih Sumber Data Utama</h2>
                            </div>
                            <p className="text-slate-600 dark:text-slate-300 text-sm mb-6 leading-relaxed">
                                Kami menemukan <strong className="text-slate-800 dark:text-white">{links.length} tautan</strong> di Mode Offline (Perangkat ini), dan <strong className="text-slate-800 dark:text-white">{conflictData.cloudLinks.length} tautan</strong> di Database Cloud Anda. Tentukan tindakan sinkronisasi:
                            </p>
                            
                            <div className="space-y-3">
                                <button onClick={() => resolveConflict('merge')} className="w-full text-left p-4 rounded-2xl border-2 border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 hover:bg-emerald-100 dark:hover:bg-emerald-900/40 transition-colors group">
                                    <h4 className="font-bold text-emerald-800 dark:text-emerald-400 mb-1 flex items-center justify-between">Gabungkan Keduanya <IconCheck className="w-5 h-5 opacity-0 group-hover:opacity-100 transition-opacity" /></h4>
                                    <p className="text-xs text-emerald-600 dark:text-emerald-500">Data lama akan tetap ada dan digabung dengan data dari Cloud.</p>
                                </button>
                                <button onClick={() => resolveConflict('replace')} className="w-full text-left p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-blue-500 dark:hover:border-blue-500 transition-colors group">
                                    <h4 className="font-bold text-slate-800 dark:text-white mb-1 flex items-center justify-between">Gunakan Data Cloud Saja <IconCheck className="w-5 h-5 text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity" /></h4>
